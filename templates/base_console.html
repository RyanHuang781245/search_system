{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}會議記錄檢索系統{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/document-console.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top app-navbar">
        <div class="container-fluid app-shell">
            <a class="navbar-brand d-flex align-items-center gap-3" href="/documents/">
                <div class="brand-mark">
                    <i data-lucide="files"></i>
                </div>
                <div>
                    <div class="fw-bold text-dark">會議記錄檢索系統</div>
                    <div class="brand-subtitle">會議記錄工作台</div>
                </div>
            </a>
            <div class="d-flex align-items-center gap-3">
                <div class="page-switch">
                    <a class="page-switch-link {% if active_page == 'documents' %}active{% endif %}" href="/documents/">文件</a>
                    <a class="page-switch-link {% if active_page == 'meetings' %}active{% endif %}" href="/meetings/">會議</a>
                    <a class="page-switch-link {% if active_page == 'search' %}active{% endif %}" href="/search/">搜尋</a>
                </div>
                <div class="user-badge">MM</div>
            </div>
        </div>
    </nav>

    <main class="container-fluid app-shell py-4 py-lg-5">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="status-toast" class="toast align-items-center border-0" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
                <div id="status-toast-body" class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="關閉"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
